name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NODE_VERSION: "22"

jobs:
  dotnet:
    name: .NET build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CodeMeridian.sln

      - name: Build
        run: dotnet build CodeMeridian.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test CodeMeridian.sln
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~CodeMeridian.Infrastructure.Integration.Tests"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Publish .NET test report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: .NET Test Report
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload .NET test results
        uses: actions/upload-artifact@v5
        if: success() || failure()
        with:
          name: dotnet-test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

  tsindexer:
    name: TsIndexer build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tools/TsIndexer/package-lock.json

      - name: Restore TsIndexer
        working-directory: tools/TsIndexer
        run: npm install --include=optional

      - name: Build TsIndexer
        working-directory: tools/TsIndexer
        run: npm run build

      - name: Test TsIndexer
        working-directory: tools/TsIndexer
        run: npm test