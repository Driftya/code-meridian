name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NODE_VERSION: "22"

jobs:
  dotnet:
    name: .NET build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CodeMeridian.sln

      - name: Build
        run: dotnet build CodeMeridian.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test CodeMeridian.sln
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~CodeMeridian.Infrastructure.Integration.Tests"
          --logger "trx"
          --results-directory TestResults

      - name: Publish .NET test report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: .NET Test Report
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload .NET test results
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: dotnet-test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

  node-tools:
    name: ${{ matrix.workspace.name }} build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - name: IndexerShared
            path: tools/IndexerShared
            artifact: indexer-shared-test-results
          - name: TsIndexer
            path: tools/TsIndexer
            artifact: tsindexer-test-results
          - name: HtmlCssIndexer
            path: tools/HtmlCssIndexer
            artifact: htmlcssindexer-test-results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.workspace.path }}/package-lock.json

      - name: Restore workspace
        working-directory: ${{ matrix.workspace.path }}
        run: npm install --include=optional

      - name: Build workspace
        working-directory: ${{ matrix.workspace.path }}
        run: npm run build

      - name: Test workspace
        working-directory: ${{ matrix.workspace.path }}
        run: >
          npx vitest run
          --reporter=default
          --reporter=junit
          --outputFile=test-results/${{ matrix.workspace.name }}.junit.xml

      - name: Upload workspace test results
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: ${{ matrix.workspace.artifact }}
          path: ${{ matrix.workspace.path }}/test-results/*.junit.xml
          if-no-files-found: warn

  publish-test-badge:
    name: Publish combined test badge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - dotnet
      - node-tools
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download test artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/test-results
          pattern: "*-test-results"
          merge-multiple: true

      - name: Generate badge JSON
        shell: pwsh
        run: >
          ./.github/scripts/generate-test-badge.ps1
          -ResultsRoot artifacts/test-results
          -OutputPath badge-output/badges/tests.json

      - name: Publish badge to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: badge-output
          keep_files: true
