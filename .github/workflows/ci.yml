name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NODE_VERSION: "22"

jobs:
  dotnet:
    name: .NET build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CodeMeridian.sln

      - name: Build
        run: dotnet build CodeMeridian.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test CodeMeridian.sln
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~CodeMeridian.Infrastructure.Integration.Tests"
          --collect:"XPlat Code Coverage"
          --logger "trx"
          --results-directory TestResults

      - name: Publish .NET test report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: .NET Test Report
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload .NET test results
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: dotnet-test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Upload .NET coverage results
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: dotnet-coverage-results
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  node-tools:
    name: ${{ matrix.workspace.name }} build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - name: IndexerShared
            path: tools/IndexerShared
            artifact: indexer-shared-test-results
          - name: TsIndexer
            path: tools/TsIndexer
            artifact: tsindexer-test-results
          - name: HtmlCssIndexer
            path: tools/HtmlCssIndexer
            artifact: htmlcssindexer-test-results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.workspace.path }}/package-lock.json

      - name: Restore workspace
        working-directory: ${{ matrix.workspace.path }}
        run: npm install --include=optional

      - name: Build workspace
        working-directory: ${{ matrix.workspace.path }}
        run: npm run build

      - name: Test workspace
        working-directory: ${{ matrix.workspace.path }}
        run: >
          npx vitest run
          --coverage.enabled=true
          --reporter=default
          --reporter=junit
          --outputFile=test-results/${{ matrix.workspace.name }}.junit.xml

      - name: Upload workspace test results
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: ${{ matrix.workspace.artifact }}
          path: ${{ matrix.workspace.path }}/test-results/*.junit.xml
          if-no-files-found: warn

      - name: Upload workspace coverage results
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: ${{ matrix.workspace.name }}-coverage-results
          path: |
            ${{ matrix.workspace.path }}/coverage/cobertura-coverage.xml
            ${{ matrix.workspace.path }}/coverage/lcov.info
          if-no-files-found: warn

  publish-reports-and-badges:
    name: Publish test and coverage reports
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - dotnet
      - node-tools
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download test artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/test-results
          pattern: "*-test-results"
          merge-multiple: true

      - name: Download coverage artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/coverage
          pattern: "*-coverage-results"

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Install ReportGenerator
        shell: pwsh
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.*

      - name: Generate badge JSON
        shell: pwsh
        run: >
          ./.github/scripts/generate-test-badge.ps1
          -ResultsRoot artifacts/test-results
          -OutputPath badge-output/badges/tests.json

      - name: Generate .NET coverage HTML report
        shell: pwsh
        run: >
          reportgenerator
          "-reports:artifacts/coverage/dotnet-coverage-results/**/coverage.cobertura.xml"
          "-targetdir:coverage-output/dotnet"
          "-reporttypes:HtmlInline;HtmlChart;JsonSummary"

      - name: Generate TypeScript coverage HTML report
        shell: pwsh
        run: >
          reportgenerator
          "-reports:artifacts/coverage/*-coverage-results/**/cobertura-coverage.xml"
          "-targetdir:coverage-output/typescript"
          "-reporttypes:HtmlInline;HtmlChart;JsonSummary"

      - name: Generate coverage summary and badges
        shell: pwsh
        run: >
          ./.github/scripts/generate-coverage-summary.ps1
          -CoverageRoot artifacts/coverage
          -BadgeOutputRoot badge-output
          -SummaryOutputPath coverage-output/coverage-summary.md
          -DotNetSummaryJsonPath coverage-output/dotnet/Summary.json
          -TypeScriptSummaryJsonPath coverage-output/typescript/Summary.json

      - name: Publish coverage summary
        shell: pwsh
        run: Get-Content -LiteralPath coverage-output/coverage-summary.md | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: coverage-output
          if-no-files-found: error

      - name: Stage GitHub Pages assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path badge-output/coverage -Force | Out-Null
          Copy-Item -Path coverage-output/dotnet -Destination badge-output/coverage/dotnet -Recurse -Force
          Copy-Item -Path coverage-output/typescript -Destination badge-output/coverage/typescript -Recurse -Force

      - name: Publish assets to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: badge-output
          keep_files: true
