name: Publish MCP Image

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image version to publish, for example 1.0.1 or 1.1.0-preview.1"
        required: true
        default: "1.0.0"

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  IMAGE_NAME: codemeridian-mcp

jobs:
  build-and-push:
    name: Build and publish MCP image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "${{ inputs.tag }}"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid version '$version'. Expected SemVer like 1.0.1 or 1.1.0-preview.1."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "Resolved version: $version"

      - name: Restore
        run: dotnet restore CodeMeridian.sln

      - name: Audit transitive .NET dependencies
        run: dotnet list CodeMeridian.sln package --vulnerable --include-transitive

      - name: Build
        run: dotnet build CodeMeridian.sln -c Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test CodeMeridian.sln -c Release --no-build --filter "FullyQualifiedName!~CodeMeridian.Infrastructure.Integration.Tests"

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore Node indexer workspaces
        run: npm install --include=optional

      - name: Audit Node indexer workspaces
        run: npm audit --audit-level=high

      - name: Build Node indexer workspaces
        run: npm run build

      - name: Test Node indexer workspaces
        run: npm test

      - name: Set image name
        id: image
        shell: bash
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/McpServer/Dockerfile
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
