name: Cleanup MCP Images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: codemeridian-mcp

jobs:
  cleanup:
    name: Keep latest MCP images
    runs-on: ubuntu-latest

    steps:
      - name: Resolve owner
        id: owner
        shell: bash
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${OWNER}" >> "$GITHUB_OUTPUT"

      - name: Delete old container versions
        uses: snok/container-retention-policy@v3
        with:
          account: ${{ steps.owner.outputs.name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: ${{ env.IMAGE_NAME }}
          keep-n-most-recent: 10
          cut-off: 7d