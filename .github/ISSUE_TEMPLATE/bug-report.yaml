name: Bug report
description: Report something that is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail so the issue can be reproduced.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
      placeholder: CodeMeridian indexed the repo, but find_impact returns no callers for...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `codemeridian serve`
        2. Run `codemeridian index . --clear`
        3. Ask the MCP client...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell
      placeholder: Paste relevant CLI, server, or MCP client output here.

  - type: input
    id: version
    attributes:
      label: CodeMeridian version
      placeholder: codemeridian --version

  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - GitHub Copilot
        - Claude Code
        - Continue.dev
        - Cline
        - Cursor
        - Codex-style agent
        - Other
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, Ubuntu 24.04, macOS, WSL, Docker, etc.