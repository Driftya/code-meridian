# Project-scoped Codex configuration
# Applies to the OpenAI Codex IDE extension (openai.chatgpt) and the Codex CLI.
# See: https://developers.openai.com/codex/mcp

# CodeMeridian — persistent Neo4j code knowledge graph exposed as an MCP server.
# Run `docker compose up -d` first to start the server on port 5100.
[mcp_servers.CodeMeridian]
url = "http://localhost:5100/sse"
default_tools_approval_mode = "auto"
startup_timeout_sec = 15
tool_timeout_sec = 60

# Required only when CodeMeridian_Auth_ApiKey is set in .env / your shell.
bearer_token_env_var = "CodeMeridian_Auth_ApiKey"
