name: host-logging

services:
  loki:
    image: grafana/loki:3.6.0
    container_name: loki
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - observability-net
    restart: unless-stopped
    labels:
      logging: "enabled"
      app: "observability"
      environment: "${OBSERVABILITY_ENVIRONMENT:-production}"

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability-net
    restart: unless-stopped
    depends_on:
      - loki
    labels:
      logging: "enabled"
      app: "observability"
      environment: "${OBSERVABILITY_ENVIRONMENT:-production}"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability-net
    restart: unless-stopped
    depends_on:
      - node-exporter
      - cadvisor
    labels:
      logging: "enabled"
      app: "observability"
      environment: "${OBSERVABILITY_ENVIRONMENT:-production}"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - observability-net
    restart: unless-stopped
    labels:
      logging: "enabled"
      app: "observability"
      environment: "${OBSERVABILITY_ENVIRONMENT:-production}"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - observability-net
    restart: unless-stopped
    labels:
      logging: "enabled"
      app: "observability"
      environment: "${OBSERVABILITY_ENVIRONMENT:-production}"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-me-now}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP:-false}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3000}
      GF_SERVER_DOMAIN: ${GF_SERVER_DOMAIN:-localhost}
      GF_AUTH_AZUREAD_ENABLED: ${GF_AUTH_AZUREAD_ENABLED:-false}
      GF_AUTH_AZUREAD_NAME: ${GF_AUTH_AZUREAD_NAME:-Microsoft}
      GF_AUTH_AZUREAD_CLIENT_ID: ${GF_AUTH_AZUREAD_CLIENT_ID:-}
      GF_AUTH_AZUREAD_CLIENT_SECRET: ${GF_AUTH_AZUREAD_CLIENT_SECRET:-}
      GF_AUTH_AZUREAD_TOKEN_URL: ${GF_AUTH_AZUREAD_TOKEN_URL:-}
      GF_AUTH_AZUREAD_AUTH_URL: ${GF_AUTH_AZUREAD_AUTH_URL:-}
      GF_AUTH_AZUREAD_SCOPES: ${GF_AUTH_AZUREAD_SCOPES:-openid email profile}
      GF_AUTH_AZUREAD_ALLOW_SIGN_UP: ${GF_AUTH_AZUREAD_ALLOW_SIGN_UP:-true}
      GF_AUTH_DISABLE_LOGIN_FORM: ${GF_AUTH_DISABLE_LOGIN_FORM:-false}
      GF_USERS_AUTO_ASSIGN_ORG: ${GF_USERS_AUTO_ASSIGN_ORG:-true}
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: ${GF_USERS_AUTO_ASSIGN_ORG_ROLE:-Admin}
    env_file:
      - .env
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - observability-net
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
    labels:
      logging: "enabled"
      app: "observability"
      environment: "${OBSERVABILITY_ENVIRONMENT:-production}"

volumes:
  loki-data:
  grafana-data:
  prometheus-data:

networks:
  observability-net:
    external: true
