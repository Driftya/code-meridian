global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          source: host

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          source: docker

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100
